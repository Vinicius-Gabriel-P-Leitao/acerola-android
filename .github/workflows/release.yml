name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-/ /g')
          VERSION_CODE=$(git tag | wc -l | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Update build.gradle.kts
        run: |
          sed -i "s/versionName = \".*$/versionName = \"${{ env.VERSION }}\"/" acerola/app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ env.VERSION_CODE }}/" acerola/app/build.gradle.kts

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > acerola/app/acerola

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: acerola

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: acerola
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/acerola/app/acerola
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add acerola/app/build.gradle.kts
          git commit -m "[chore]: bump version to ${{ env.VERSION }} [skip ci]"
          git push origin HEAD:main HEAD:develop

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: acerola/app/build/outputs/apk/release/app-release.apk
          name: "Acerola ${{ github.ref_name }}"
          generate_release_notes: true
