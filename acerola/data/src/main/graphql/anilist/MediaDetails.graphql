query MediaDetails($id: Int) {
  Media(id: $id, type: MANGA) {
    id
    title {
      userPreferred
      romaji
    }
    status
    description(asHtml: false)
    genres
    averageScore
    popularity
    trending
    startDate {
      year
    }
    staff(sort: RELEVANCE) {
      edges {
        role
        node {
          name {
            full
          }
        }
      }
    }
    coverImage {
      large
    }
    bannerImage
  }
}
